<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../assets/style/desactive_doctor.css" />
  </head>
  <body>
    <div class="overlay-modal" id="modalDesativar">
      <div class="conteudo-central confirmacao-modal">
        <div class="avatar-desativa-container">
          <img src="../assets/img/usr.png" alt="" />
        </div>

        <h3 class="subtitulo-formulario titulo-centralizado">
          Deseja desativar este perfil?
        </h3>

        <div class="bloco-medico-desativa">
          <div class="faixa-destaque-vermelha"></div>
          <div class="info-texto-desativa">
            <span class="nome-medico-desativa">Brenda de Almeida</span>
            <span class="sub-info-desativa">Ortopedista | CRM 47.889-PR</span>
          </div>
        </div>

        <div class="texto-aviso-container">
          <p>
            Ao desativar este perfil, suas informações ficarão desabilitadas
            para pesquisas e futuros agendamentos.
          </p>
          <p>
            Certifique-se que não há consultas agendadas, caso tenha, a
            desativação não poderá ser concluída.
          </p>
        </div>

        <div class="botoes-form-footer botoes-modal">
          <button class="btn-perigo-principal">Desativar este perfil</button>
          <button class="btn-cancelar">Cancelar</button>
        </div>
      </div>
    </div>
  </body>
</html>

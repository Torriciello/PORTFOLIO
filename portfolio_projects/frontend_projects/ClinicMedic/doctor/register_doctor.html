<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../favicon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/style/register_doctor.css" />
    <title>Cadastro Medico - ClinicMedic</title>
  </head>

  <body>
    <header class="header-desktop">
      <a href="./doctor.html" class="btn-voltar">
        <span class="material-icons">chevron_left</span>
      </a>
      <h2 class="new_doctor">Cadastrar Novo Médico</h2>
    </header>

    <main class="main-desktop">
      <form class="formulario-clinica" id="registerDoctorForm">
        <h3 class="subtitulo-formulario">Profissional</h3>
        <div class="input-group">
          <input
            type="text"
            id="nome"
            placeholder="Nome completo"
            class="input-padrao"
            required
          />
        </div>

        <div class="input-row">
          <div class="select-wrapper flex-2">
            <select
              id="especialidade"
              class="input-padrao select-custom"
              required
            >
              <option value="" disabled selected>Especialidade</option>
              <option value="CARDIOLOGIA">Cardiologia</option>
              <option value="PEDIATRIA">Pediatria</option>
              <option value="ORTOPEDIA">Ortopedia</option>
              <option value="GINECOLOGIA">Ginecologia</option>
              <option value="DERMATOLOGIA">Dermatologia</option>
            </select>
            <span class="material-icons seta-clique">expand_more</span>
          </div>
          <input
            type="text"
            id="crm"
            placeholder="CRM"
            class="input-padrao flex-1"
            required
          />
        </div>

        <h3 class="subtitulo-formulario">Contatos</h3>
        <div class="input-group">
          <input
            type="email"
            id="email"
            placeholder="E-mail"
            class="input-padrao"
            required
          />
        </div>
        <div class="input-group">
          <input
            type="tel"
            id="telefone"
            placeholder="Telefone ou celular"
            class="input-padrao"
            required
          />
        </div>

        <h3 class="subtitulo-formulario">Endereço profissional</h3>
        <div class="input-group">
          <input
            type="text"
            id="logradouro"
            placeholder="Logradouro"
            class="input-padrao"
            required
          />
        </div>

        <div class="input-row">
          <input
            type="text"
            id="numero"
            placeholder="Número"
            class="input-padrao flex-1"
            required
          />
          <input
            type="text"
            id="complemento"
            placeholder="Complemento"
            class="input-padrao flex-2"
          />
        </div>

        <div class="input-group">
          <input
            type="text"
            id="cidade"
            placeholder="Cidade"
            class="input-padrao"
            required
          />
        </div>

        <div class="input-row">
          <div class="select-wrapper flex-1">
            <select id="uf" class="input-padrao select-custom" required>
              <option value="">Selecione...</option>
              <option value="acre">Acre</option>
              <option value="alagoas">Alagoas</option>
              <option value="amapa">Amapá</option>
              <option value="amazonas">Amazonas</option>
              <option value="bahia">Bahia</option>
              <option value="ceara">Ceará</option>
              <option value="distritofederal">Distrito Federal</option>
              <option value="espiritosanto">Espírito Santo</option>
              <option value="goias">Goiás</option>
              <option value="maranhao">Maranhão</option>
              <option value="matogrossodosul">Mato Grosso do Sul</option>
              <option value="matogrosso">Mato Grosso</option>
              <option value="minasgerais">Minas Gerais</option>
              <option value="para">Pará</option>
              <option value="paraiba">Paraíba</option>
              <option value="parana">Paraná</option>
              <option value="pernambuco">Pernambuco</option>
              <option value="piaui">Piauí</option>
              <option value="riodejaneiro">Rio de Janeiro</option>
              <option value="riograndedonorte">Rio Grande do Norte</option>
              <option value="riograndedosul">Rio Grande do Sul</option>
              <option value="rondonia">Rondônia</option>
              <option value="roraima">Roraima</option>
              <option value="santacatarina">Santa Catarina</option>
              <option value="saopaulo">São Paulo</option>
              <option value="sergipe">Sergipe</option>
              <option value="tocantins">Tocantins</option>
            </select>
            <span class="material-icons seta-clique">expand_more</span>
          </div>
          <input
            type="text"
            id="cep"
            placeholder="CEP"
            class="input-padrao flex-2"
            required
          />
        </div>

        <div class="botoes-form-footer">
          <button type="submit" class="btn-concluir">Concluir cadastro</button>
          <button
            type="button"
            class="btn-cancelar"
            onclick="window.location.href = './doctor.html'"
          >
            Cancelar
          </button>
        </div>
      </form>

      <script src="../assets/js/register_doctor.js"></script>
    </main>
  </body>
</html>

<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | ClinicMedic</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style/style.css" />
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <img src="./assets/img/logoHome.png" alt="ClinicMedic" class="main-logo" />
      <nav class="header-nav">
        <button class="btn-logout" onclick="logout()">Sair</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 class="section-title">Escolha qual seção deseja iniciar:</h2>

    <nav class="cards-grid">
      <a href="./doctor/doctor.html" class="card">
        <div class="card-icon">
          <img src="./assets/img/doctor.png" alt="Médicos" />
        </div>
        <span class="card-text">Médicos(as)</span>
      </a>

      <a href="./patient/patient.html" class="card">
        <div class="card-icon">
          <img src="./assets/img/patient.png" alt="Pacientes" />
        </div>
        <span class="card-text">Pacientes</span>
      </a>

      <a href="./consultation/consultation.html" class="card">
        <div class="card-icon">
          <img src="./assets/img/consultation.png" alt="Consultas" />
        </div>
        <span class="card-text">Consultas</span>
      </a>
    </nav>
  </main>
    <script src="./assets/js/script.js"></script>
</body>
</html>

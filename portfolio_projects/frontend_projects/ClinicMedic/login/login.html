<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | ClinicMedic</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Segoe+UI&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style/login.css" />
  </head>
  <body>
    <main class="login-container">
      
      <div class="left-side">
        <div class="form-wrapper">          
          <form id="loginForm">
            <h1 class="welcome-text">Olá,<br>Bem-vindo de volta!</h1>
            
            <div class="input-group">
              <input type="email" id="email" placeholder="Digite o seu e-mail" required />
            </div>
            
            <div class="input-group">
              <input type="password" id="password" placeholder="Senha" required />
            </div>

            <div class="form-options">
              <div class="show-password-container">
                <input type="checkbox" id="show-password" />
                <label for="show-password">Mostrar a minha senha</label>
              </div>
              <a href="forgot-password.html" class="forgot-link">Esqueci a minha senha</a>
            </div>

            <div class="form-actions">
              <button type="button" class="button-register">Criar conta</button>
              <button type="submit" class="button-login">Login</button>
            </div>
          </form>
        </div>
      </div>

      <div class="right-side">
        <div class="image-wrapper">
          <img src="../assets/img/clinic.png" alt="Ilustração médica" />
        </div>
      </div>

    </main>

    <script src="../assets/js/login.js"></script>
  </body>
</html>
